name: easydw CI/CD Pipeline

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
  pull_request:

env:
  UV_CACHE_DIR: ~/.cache/uv

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 ssh.andreaconsonni.dev >> ~/.ssh/known_hosts
          echo "Host ssh.andreaconsonni.dev" >> ~/.ssh/config
          echo "  Port 2222" >> ~/.ssh/config
          echo "  StrictHostKeyChecking yes" >> ~/.ssh/config

      - name: Clone repository
        run: |
          git clone ssh://git@ssh.andreaconsonni.dev:2222/spazza/easydw.git .
          git checkout --detach "${GITHUB_SHA}"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Cache uv
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: uv run pytest

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 ssh.andreaconsonni.dev >> ~/.ssh/known_hosts
          echo "Host ssh.andreaconsonni.dev" >> ~/.ssh/config
          echo "  Port 2222" >> ~/.ssh/config
          echo "  StrictHostKeyChecking yes" >> ~/.ssh/config

      - name: Clone repository
        run: |
          git clone ssh://git@ssh.andreaconsonni.dev:2222/spazza/easydw.git .
          git checkout --detach "${GITHUB_SHA}"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build package
        run: uv build

      - name: Publish package
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish dist/*